<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Crafter's Bench</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: #e0e0e0; text-align: center; padding: 40px 20px; }
        .container { max-width: 600px; margin: auto; background: #1e1e1e; padding: 30px; border-radius: 12px; border: 1px solid #333; box-shadow: 0 15px 35px rgba(0,0,0,0.7); }
        h1 { color: #00d4ff; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 30px; }
        
        .button-group { display: flex; justify-content: center; gap: 20px; margin-bottom: 30px; }
        
        .craft-btn { 
            padding: 20px 40px; font-size: 1.2rem; cursor: pointer; border: none; border-radius: 8px; 
            font-weight: bold; color: white; transition: 0.2s; flex: 1;
        }
        .btn-arrow { background: #2d5af1; }
        .btn-arrow:hover { background: #1a42cc; transform: translateY(-3px); }
        
        .btn-trinket { background: #9b59b6; }
        .btn-trinket:hover { background: #8e44ad; transform: translateY(-3px); }

        .display-area { text-align: left; background: #161616; padding: 25px; border-radius: 10px; border-left: 4px solid #00d4ff; min-height: 100px; margin-top: 20px; }
        
        .item-name { font-weight: bold; font-size: 1.4rem; color: #fff; display: block; margin-bottom: 10px; border-bottom: 1px solid #333; padding-bottom: 5px; }
        .item-rules { color: #aaa; font-style: italic; font-size: 1.1rem; line-height: 1.5; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate { animation: fadeIn 0.4s ease; }
    </style>
</head>
<body>

<div class="container">
    <h1>The Crafter's Bench</h1>
    
    <div class="button-group">
        <button class="craft-btn btn-arrow" onclick="generate('arrows')">🏹 Arrow</button>
        <button class="craft-btn btn-trinket" onclick="generate('trinkets')">🔮 Trinket</button>
    </div>

    <div class="display-area" id="display">
        <p style="color: #555; text-align: center;">Choose a category to begin crafting...</p>
    </div>
</div>

<script>
    let powersData = null;

    async function loadPowers() {
        try {
            const response = await fetch('powers.json?v=' + new Date().getTime());
            powersData = await response.json();
        } catch (error) {
            console.error("Error loading JSON:", error);
            document.getElementById('display').innerHTML = '<p style="color: red;">Error: Could not load data.</p>';
        }
    }

    async function generate(category) {
        if (!powersData) await loadPowers();
        
        const list = powersData[category];
        const item = list[Math.floor(Math.random() * list.length)];
        
        const display = document.getElementById('display');
        
        // Update display with animation
        display.innerHTML = `
            <div class="animate">
                <span class="item-name">${item.name}</span>
                <span class="item-rules">${item.rules}</span>
            </div>
        `;
    }

    // Initial load
    loadPowers();
</script>

</body>
</html>
